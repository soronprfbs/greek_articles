// =====================================================================
// Telegram WebApp setup
// =====================================================================
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) {
  try { tg.ready(); } catch(e) {}
  try { tg.expand(); } catch(e) {}
  try { tg.setHeaderColor('#1A2A4A'); } catch(e) {}
  try { tg.setBackgroundColor('#F7F2E8'); } catch(e) {}
  try { tg.disableVerticalSwipes && tg.disableVerticalSwipes(); } catch(e) {}
}

// =====================================================================
// Storage — Telegram CloudStorage with localStorage fallback
// =====================================================================
const STORAGE_KEY = 'greek-cases-stats-v2';

const cloudGet = (key) => new Promise((resolve) => {
  let lsVal = null;
  try { lsVal = localStorage.getItem(key); } catch(e) {}
  if (tg && tg.CloudStorage && tg.CloudStorage.getItem) {
    try {
      tg.CloudStorage.getItem(key, (err, val) => {
        if (err || !val) resolve(lsVal);
        else resolve(val);
      });
    } catch(e) { resolve(lsVal); }
  } else {
    resolve(lsVal);
  }
});

const cloudSet = (key, value) => new Promise((resolve) => {
  try { localStorage.setItem(key, value); } catch(e) {}
  if (tg && tg.CloudStorage && tg.CloudStorage.setItem) {
    try { tg.CloudStorage.setItem(key, value, () => resolve()); }
    catch(e) { resolve(); }
  } else { resolve(); }
});

const cloudDel = (key) => new Promise((resolve) => {
  try { localStorage.removeItem(key); } catch(e) {}
  if (tg && tg.CloudStorage && tg.CloudStorage.removeItem) {
    try { tg.CloudStorage.removeItem(key, () => resolve()); }
    catch(e) { resolve(); }
  } else { resolve(); }
});

const haptic = {
  success: () => { try { tg && tg.HapticFeedback.notificationOccurred('success'); } catch(e) {} },
  error:   () => { try { tg && tg.HapticFeedback.notificationOccurred('error'); } catch(e) {} },
  light:   () => { try { tg && tg.HapticFeedback.impactOccurred('light'); } catch(e) {} },

// =====================================================================
// Helpers
// =====================================================================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

const initialStats = {
  totalAnswered: 0, totalCorrect: 0, streak: 0, bestStreak: 0,
  byCase: {
    nominative: { correct: 0, total: 0 },
    genitive:   { correct: 0, total: 0 },
    accusative: { correct: 0, total: 0 },
  },
};

const initialSession = { answered: 0, correct: 0 };

// =====================================================================
// App
// =====================================================================
function App() {
  const [screen, setScreen] = useState('home');
  const [stats, setStats] = useState(initialStats);
  const [statsLoaded, setStatsLoaded] = useState(false);
  const [session, setSession] = useState(initialSession);
  const [deck, setDeck] = useState([]);
  const [deckIdx, setDeckIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [feedbackAnim, setFeedbackAnim] = useState(false);

  // Load stats once
  useEffect(() => {
    cloudGet(STORAGE_KEY).then((val) => {
      if (val) {
        try { setStats(JSON.parse(val)); } catch(e) {}
      }
      setStatsLoaded(true);
    });
  }, []);

  // Telegram BackButton — show on practice, hide on home
  useEffect(() => {
    if (!tg || !tg.BackButton) return;
    const goHome = () => { setScreen('home'); };
    if (screen === 'practice') {
      try { tg.BackButton.show(); } catch(e) {}
      try { tg.BackButton.onClick(goHome); } catch(e) {}
      return () => {
        try { tg.BackButton.hide(); } catch(e) {}
        try { tg.BackButton.offClick(goHome); } catch(e) {}
      };
    } else {
      try { tg.BackButton.hide(); } catch(e) {}
    }
  }, [screen]);

  const persistStats = (next) => {
    setStats(next);
    cloudSet(STORAGE_KEY, JSON.stringify(next));
  };

  const resetStats = () => {
    setStats(initialStats);
    cloudDel(STORAGE_KEY);
  };

  const startMode = (mode) => {
    haptic.medium();
    let bank;
    if (mode === 'articles') bank = ARTICLE_EXERCISES.map(e => Object.assign({}, e, { kind: 'article' }));
    else if (mode === 'endings') bank = ENDING_EXERCISES.map(e => Object.assign({}, e, { kind: 'ending' }));
    else bank = ARTICLE_EXERCISES.map(e => Object.assign({}, e, { kind: 'article' }))
                  .concat(ENDING_EXERCISES.map(e => Object.assign({}, e, { kind: 'ending' })));
    setDeck(shuffle(bank));
    setDeckIdx(0);
    setSelected(null);
    setRevealed(false);
    setSession(initialSession);
    setScreen('practice');
  };

  const current = deck[deckIdx];

  const submitAnswer = (answer) => {
    if (revealed) return;
    setSelected(answer);
    setRevealed(true);
    setFeedbackAnim(true);
    const correct = answer === current.correct;
    if (correct) haptic.success(); else haptic.error();

    const caseKey = current.caseType;
    const next = Object.assign({}, stats, {
      totalAnswered: stats.totalAnswered + 1,
      totalCorrect: stats.totalCorrect + (correct ? 1 : 0),
      streak: correct ? stats.streak + 1 : 0,
      bestStreak: correct ? Math.max(stats.bestStreak, stats.streak + 1) : stats.bestStreak,
      byCase: Object.assign({}, stats.byCase, {
        [caseKey]: {
          correct: ((stats.byCase[caseKey] && stats.byCase[caseKey].correct) || 0) + (correct ? 1 : 0),
          total:   ((stats.byCase[caseKey] && stats.byCase[caseKey].total) || 0) + 1,
        }
      }),
    });
    persistStats(next);
    setSession({
      answered: session.answered + 1,
      correct: session.correct + (correct ? 1 : 0),
    });
    setTimeout(() => setFeedbackAnim(false), 400);
  };

  const nextQuestion = () => {
    haptic.light();
    let nextIdx = deckIdx + 1;
    if (nextIdx >= deck.length) {
      setDeck(shuffle(deck));
      nextIdx = 0;
    }
    setDeckIdx(nextIdx);
    setSelected(null);
    setRevealed(false);
  };

  if (!statsLoaded) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <div className="text-center">
          <div className="font-display text-3xl font-semibold mb-2" style={{ color: '#1A2A4A' }}>Πτώσεις</div>
          <div className="text-sm" style={{ color: '#5A6379' }}>Загрузка…</div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen w-full">
      <div className="max-w-md mx-auto px-5 py-6 min-h-screen flex flex-col">
        {/* Header */}
        <header className="flex items-center justify-between mb-6">
          <button onClick={() => { haptic.light(); setScreen('home'); }} className="flex items-center gap-2" style={{ color: '#1A2A4A' }}>
            <div className="w-8 h-8 rounded-full flex items-center justify-center" style={{ backgroundColor: '#1A2A4A' }}>
              <span className="font-display text-white text-lg leading-none">Π</span>
            </div>
            <div className="font-display text-base font-semibold tracking-tight">Πτώσεις</div>
          </button>
          <div className="flex items-center gap-2 text-sm">
            <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full" style={{ backgroundColor: stats.streak > 0 ? '#FBE9D9' : '#F0EAD9' }}>
              <Flame size={14} fill={stats.streak > 0 ? '#B5613B' : 'none'} style={{ color: '#B5613B' }} />
              <span className="font-semibold tabular" style={{ color: '#B5613B' }}>{stats.streak}</span>
            </div>
            <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full" style={{ backgroundColor: '#EAF0DC' }}>
              <CheckIcon size={14} strokeWidth={3} style={{ color: '#6B7E3A' }} />
              <span className="font-semibold tabular" style={{ color: '#4A5727' }}>
                {stats.totalCorrect}<span style={{ color: '#8AA655', fontWeight: 400 }}>/{stats.totalAnswered}</span>
              </span>
            </div>
          </div>
        </header>

        {screen === 'home' && (
          <HomeScreen stats={stats} onStart={startMode} onReset={resetStats} />
        )}

        {screen === 'practice' && current && (
          <PracticeScreen
            current={current}
            session={session}
            deckSize={deck.length}
            deckIdx={deckIdx}
            selected={selected}
            revealed={revealed}
            onAnswer={submitAnswer}
            onNext={nextQuestion}
            onBack={() => setScreen('home')}
            feedbackAnim={feedbackAnim}
          />
        )}
      </div>
    </div>
  );
}

// =====================================================================
// Home Screen
// =====================================================================
function HomeScreen({ stats, onStart, onReset }) {
  const [showReset, setShowReset] = useState(false);
  const isFirstTime = stats.totalAnswered === 0;
  const accuracy = stats.totalAnswered > 0 ? Math.round((stats.totalCorrect / stats.totalAnswered) * 100) : 0;

  return (
    <div className="flex-1 flex flex-col animate-fade">
      <div className="mb-8">
        <p className="text-sm uppercase tracking-widest mb-2" style={{ color: '#B5613B', letterSpacing: '0.15em' }}>
          {isFirstTime ? 'Καλώς ήρθες' : 'Συνεχίζουμε'}
        </p>
        <h1 className="font-display text-4xl font-semibold leading-tight" style={{ color: '#1A2A4A' }}>
          {isFirstTime ? (
            <>Тренажёр <em style={{ color: '#B5613B' }}>греческих</em> падежей</>
          ) : (
            <>С возвращением.<br /><span style={{ color: '#B5613B' }} className="italic">Продолжаем.</span></>
          )}
        </h1>
      </div>

      {!isFirstTime && (
        <div className="rounded-2xl p-5 mb-6 animate-slide-up" style={{
          backgroundColor: 'white',
          boxShadow: '0 1px 3px rgba(26, 42, 74, 0.06), 0 4px 20px rgba(26, 42, 74, 0.04)',
        }}>
          <div className="grid grid-cols-3 gap-4 mb-4">
            <Stat label="Ответов" value={stats.totalAnswered} />
            <Stat label="Точность" value={`${accuracy}%`} />
            <Stat label="Рекорд" value={stats.bestStreak} icon={<Flame size={14} style={{ color: '#B5613B' }} />} />
          </div>
          <div className="pt-4 border-t" style={{ borderColor: '#F0EAD9' }}>
            <p className="text-xs uppercase tracking-wider mb-3" style={{ color: '#5A6379', letterSpacing: '0.1em' }}>По падежам</p>
            <div className="space-y-2">
              {Object.entries(stats.byCase).map(([key, data]) => {
                const labels = { nominative: 'Именительный', genitive: 'Родительный', accusative: 'Винительный' };
                const pct = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
                return (
                  <div key={key} className="flex items-center gap-3">
                    <span className="text-sm flex-shrink-0 w-32" style={{ color: '#1A2A4A' }}>{labels[key]}</span>
                    <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ backgroundColor: '#F0EAD9' }}>
                      <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, backgroundColor: '#6B7E3A' }} />
                    </div>
                    <span className="text-xs font-medium w-12 text-right tabular" style={{ color: '#5A6379' }}>{data.total > 0 ? `${pct}%` : '—'}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      <div className="space-y-3 mb-4">
        <p className="text-xs uppercase tracking-widest mb-3" style={{ color: '#5A6379', letterSpacing: '0.15em' }}>
          Выбери тренировку
        </p>

        <ModeCard title="Артикли" subtitle="ο, η, το, του, της, τον, τη, την" description="Базовый уровень — выбери правильный артикль" icon={<BookOpen size={20} />} accent="#1A2A4A" onClick={() => onStart('articles')} recommended={isFirstTime} />
        <ModeCard title="Окончания" subtitle="артикль + окончание" description="Подставь и артикль, и окончание слова" icon={<TypeIcon size={20} />} accent="#B5613B" onClick={() => onStart('endings')} />
        <ModeCard title="Микс" subtitle="Всё вместе" description="Случайные задания обоих типов" icon={<Award size={20} />} accent="#6B7E3A" onClick={() => onStart('mixed')} />
      </div>

      {!isFirstTime && (
        <div className="mt-auto pt-6 text-center">
          {!showReset ? (
            <button onClick={() => { haptic.light(); setShowReset(true); }} className="text-xs flex items-center gap-1.5 mx-auto opacity-60 active:opacity-100 transition-opacity" style={{ color: '#5A6379' }}>
              <RotateCcw size={12} />
              Сбросить прогресс
            </button>
          ) : (
            <div className="flex items-center justify-center gap-2 text-xs" style={{ color: '#5A6379' }}>
              <span>Точно?</span>
              <button onClick={() => { haptic.medium(); onReset(); setShowReset(false); }} className="font-semibold underline" style={{ color: '#A04438' }}>Да, сбросить</button>
              <span>·</span>
              <button onClick={() => setShowReset(false)} className="font-semibold underline" style={{ color: '#1A2A4A' }}>Нет</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Stat({ label, value, icon }) {
  return (
    <div>
      <p className="text-xs uppercase tracking-wider mb-1" style={{ color: '#5A6379', letterSpacing: '0.1em' }}>{label}</p>
      <div className="font-display text-2xl font-semibold flex items-center gap-1.5 tabular" style={{ color: '#1A2A4A' }}>
        {value}{icon}
      </div>
    </div>
  );
}

function ModeCard({ title, subtitle, description, icon, accent, onClick, recommended }) {
  return (
    <button onClick={onClick} className="w-full text-left rounded-2xl p-4 transition-all active:scale-[0.99] relative overflow-hidden" style={{
      backgroundColor: 'white',
      boxShadow: '0 1px 3px rgba(26, 42, 74, 0.06), 0 4px 20px rgba(26, 42, 74, 0.04)',
    }}>
      {recommended && (
        <div className="absolute top-3 right-3 text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full font-semibold" style={{ backgroundColor: '#FBF1E0', color: '#B5613B' }}>
          Старт
        </div>
      )}
      <div className="flex items-start gap-3">
        <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style={{ backgroundColor: `${accent}12`, color: accent }}>
          {icon}
        </div>
        <div className="flex-1 min-w-0">
          <h3 className="font-display text-xl font-semibold leading-tight" style={{ color: '#1A2A4A' }}>{title}</h3>
          <p className="text-xs mt-0.5 mb-1.5 font-display italic" style={{ color: accent }}>{subtitle}</p>
          <p className="text-sm leading-snug" style={{ color: '#5A6379' }}>{description}</p>
        </div>
        <ChevronRight size={20} className="flex-shrink-0 mt-1" style={{ color: '#5A6379' }} />
      </div>
    </button>
  );
}

// =====================================================================
// Practice Screen
// =====================================================================
function PracticeScreen({ current, session, deckSize, deckIdx, selected, revealed, onAnswer, onNext, onBack, feedbackAnim }) {
  const isCorrect = revealed && selected === current.correct;
  const isWrong = revealed && selected !== current.correct;
  const options = current.kind === 'article' ? ARTICLE_OPTIONS : current.options;

  return (
    <div className="flex-1 flex flex-col animate-fade">
      {/* Progress */}
      <div className="mb-4">
        <div className="flex items-center justify-between mb-2 text-xs" style={{ color: '#5A6379' }}>
          <span className="uppercase tracking-widest font-medium" style={{ letterSpacing: '0.12em' }}>
            {current.kind === 'article' ? 'Подставь артикль' : 'Подставь артикль и окончание'}
          </span>
          <span className="font-semibold tabular">
            <span style={{ color: '#1A2A4A' }}>{deckIdx + 1}</span>
            <span> / {deckSize}</span>
          </span>
        </div>
        <div className="h-1 rounded-full overflow-hidden" style={{ backgroundColor: '#F0EAD9' }}>
          <div className="h-full rounded-full transition-all duration-500" style={{
            width: `${((deckIdx + (revealed ? 1 : 0)) / deckSize) * 100}%`,
            backgroundColor: '#1A2A4A',
          }} />
        </div>
        {session.answered > 0 && (
          <div className="flex items-center gap-3 mt-2 text-xs" style={{ color: '#5A6379' }}>
            <span>В этой сессии:</span>
            <span className="flex items-center gap-1">
              <CheckIcon size={12} strokeWidth={3} style={{ color: '#6B7E3A' }} />
              <span className="font-semibold tabular" style={{ color: '#4A5727' }}>{session.correct}</span>
            </span>
            <span className="flex items-center gap-1">
              <XIcon size={12} strokeWidth={3} style={{ color: '#A04438' }} />
              <span className="font-semibold tabular" style={{ color: '#7A2F26' }}>{session.answered - session.correct}</span>
            </span>
          </div>
        )}
      </div>

      {/* Question card */}
      <div
        className={`rounded-3xl p-7 mb-5 ${feedbackAnim && isWrong ? 'animate-shake' : ''} ${feedbackAnim && isCorrect ? 'animate-pop' : ''}`}
        style={{
          backgroundColor: 'white',
          boxShadow: '0 2px 4px rgba(26, 42, 74, 0.06), 0 12px 32px rgba(26, 42, 74, 0.06)',
          border: revealed ? `2px solid ${isCorrect ? '#6B7E3A' : '#A04438'}` : '2px solid transparent',
          transition: 'border-color 0.3s ease',
        }}
      >
        {current.kind === 'article' ? (
          <ArticleQuestion ex={current} revealed={revealed} />
        ) : (
          <EndingQuestion ex={current} revealed={revealed} isCorrect={isCorrect} />
        )}

        <p className="text-sm italic mt-5 pt-5 border-t" style={{ color: '#5A6379', borderColor: '#F0EAD9' }}>
          {current.translation}
        </p>
      </div>

      {/* Options */}
      {current.kind === 'article' ? (
        <div className="grid grid-cols-4 gap-2 mb-4">
          {ARTICLE_OPTIONS.map(opt => (
            <AnswerButton key={opt} label={opt}
              onClick={() => onAnswer(opt)}
              isSelected={selected === opt}
              isCorrect={revealed && opt === current.correct}
              isWrong={revealed && selected === opt && opt !== current.correct}
              disabled={revealed} />
          ))}
        </div>
      ) : (
        <div className="grid grid-cols-2 gap-2 mb-4">
          {options.map(opt => {
            const [art, end] = opt.split('|');
            return (
              <AnswerButton key={opt} label={`${art}  ·  -${end}`}
                onClick={() => onAnswer(opt)}
                isSelected={selected === opt}
                isCorrect={revealed && opt === current.correct}
                isWrong={revealed && selected === opt && opt !== current.correct}
                disabled={revealed} />
            );
          })}
        </div>
      )}

      {/* Feedback */}
      {revealed && (
        <div className="rounded-2xl p-4 mb-4 animate-slide-up" style={{
          backgroundColor: isCorrect ? '#F1F4E8' : '#FBE9E6',
          borderLeft: `3px solid ${isCorrect ? '#6B7E3A' : '#A04438'}`,
        }}>
          <div className="flex items-start gap-2.5">
            <div className="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center mt-0.5" style={{
              backgroundColor: isCorrect ? '#6B7E3A' : '#A04438',
            }}>
              {isCorrect ? <CheckIcon size={14} strokeWidth={3} style={{ color: 'white' }} /> : <XIcon size={14} strokeWidth={3} style={{ color: 'white' }} />}
            </div>
            <div className="flex-1">
              <p className="font-semibold text-sm mb-1" style={{ color: isCorrect ? '#4A5727' : '#7A2F26' }}>
                {isCorrect ? 'Верно!' : (
                  <>Правильно: <span className="font-display italic">
                    {current.kind === 'ending'
                      ? (() => { const [a, e] = current.correct.split('|'); return `${a}  ·  -${e}`; })()
                      : current.correct}
                  </span></>
                )}
              </p>
              <p className="text-sm leading-snug" style={{ color: isCorrect ? '#4A5727' : '#7A2F26' }}>
                {current.hint}
              </p>
            </div>
          </div>
        </div>
      )}

      {/* Action button */}
      <div className="mt-auto">
        {revealed ? (
          <button onClick={onNext} className="w-full rounded-2xl py-4 px-6 font-semibold flex items-center justify-center gap-2 transition-all active:scale-[0.99]" style={{ backgroundColor: '#1A2A4A', color: 'white' }}>
            Дальше<ChevronRight size={18} />
          </button>
        ) : (
          <button onClick={onBack} className="w-full text-sm py-3 transition-opacity opacity-60 active:opacity-100" style={{ color: '#5A6379' }}>
            ← На главную
          </button>
        )}
      </div>
    </div>
  );
}

function ArticleQuestion({ ex, revealed }) {
  const parts = ex.sentence.split('__');
  return (
    <div className="font-display text-2xl leading-relaxed" style={{ color: '#1A2A4A' }}>
      {parts[0]}
      <span className="inline-block mx-1 px-3 py-0.5 rounded-md" style={{
        backgroundColor: revealed ? '#6B7E3A20' : '#F7F2E8',
        color: revealed ? '#6B7E3A' : '#B5613B',
        minWidth: '3ch', textAlign: 'center', fontStyle: 'italic',
      }}>
        {revealed ? ex.correct : '___'}
      </span>
      {parts[1]}
    </div>
  );
}

function EndingQuestion({ ex, revealed, isCorrect }) {
  const color = revealed ? (isCorrect ? '#6B7E3A' : '#A04438') : '#B5613B';
  let art = '___', end = '___';
  if (revealed) {
    const split = ex.correct.split('|');
    art = split[0]; end = split[1];
  }
  const blankStyle = {
    color: color,
    backgroundColor: revealed ? `${color}20` : '#F7F2E8',
    padding: '0 4px',
    borderRadius: '4px',
    fontStyle: revealed ? 'normal' : 'italic',
    fontWeight: 'bold',
  };
  return (
    <div className="font-display text-2xl leading-relaxed" style={{ color: '#1A2A4A' }}>
      {ex.prefix}
      <span style={blankStyle}>{art}</span>
      {ex.middle}
      <span style={blankStyle}>{end}</span>
      {ex.suffix}
    </div>
  );
}

function AnswerButton({ label, onClick, isSelected, isCorrect, isWrong, disabled }) {
  let bg = 'white', color = '#1A2A4A', borderColor = '#E8E0CC';
  if (isCorrect) { bg = '#6B7E3A'; color = 'white'; borderColor = '#6B7E3A'; }
  else if (isWrong) { bg = '#A04438'; color = 'white'; borderColor = '#A04438'; }
  else if (isSelected) { borderColor = '#1A2A4A'; }

  const handleClick = () => {
    if (disabled) return;
    haptic.light();
    onClick();
  };

  return (
    <button
      onClick={handleClick}
      disabled={disabled}
      className={`rounded-xl transition-all py-3 text-center ${disabled ? '' : 'active:scale-[0.97]'}`}
      style={{
        backgroundColor: bg, color: color,
        border: `2px solid ${borderColor}`,
        opacity: disabled && !isCorrect && !isWrong ? 0.5 : 1,
      }}
    >
      <div className="font-display text-lg font-semibold">{label}</div>
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
